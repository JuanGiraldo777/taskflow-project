<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Maison de L'Eternel: Donde el aroma nunca muere</title>

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/imgs/Maison_PNG.png"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/imgs/Maison_PNG.png"
    />

    <!-- Optimización fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Estilos -->
    <link rel="stylesheet" href="src/output.css" />
  </head>

  <body>
    <!-- OVERLAY -->
    <div class="overlay fixed inset-0 bg-black/45 z-[250]" id="overlay"></div>

    <!-- SIDE MENU -->
    <aside
      class="side-menu fixed top-0 left-0 w-[280px] h-screen bg-(--bg) z-[300] pt-[140px] px-8"
      id="sideMenu"
    >
      <nav>
        <ul class="list-none">
          <li class="mb-7">
            <a
              href="#"
              class="no-underline text-(--text) font-serif text-[22px] tracking-wide"
              >Ver Todos</a
            >
          </li>
          <li class="mb-7">
            <a
              href="#"
              class="no-underline text-(--text) font-serif text-[22px] tracking-wide"
              >Caballero</a
            >
          </li>
          <li class="mb-7">
            <a
              href="#"
              class="no-underline text-(--text) font-serif text-[22px] tracking-wide"
              >Mujer</a
            >
          </li>
          <li class="mb-7">
            <a
              href="#"
              class="no-underline text-(--text) font-serif text-[22px] tracking-wide"
              >Diseñador</a
            >
          </li>
          <li class="mb-7">
            <a
              href="#"
              class="no-underline text-(--text) font-serif text-[22px] tracking-wide"
              >Unisex</a
            >
          </li>
          <li class="mb-7">
            <a
              href="#"
              class="no-underline text-(--text) font-serif text-[22px] tracking-wide"
              >Arabe</a
            >
          </li>
          <li class="mb-7">
            <a
              href="#"
              class="no-underline text-(--text) font-serif text-[22px] tracking-wide"
              >Nicho</a
            >
          </li>
        </ul>
      </nav>
    </aside>

    <header class="top-bar absolute top-0 left-0 w-full h-[150px] z-10">
      <div
        class="max-w-[1400px] mx-auto h-full grid grid-cols-[1fr_auto_1fr] items-center px-12 text-(--primary-text)"
      >
        <!--IZQUIERDA-->
        <div class="justify-self-start flex items-center gap-8">
          <button
            id="darkModeToggle"
            class="mode-toggle flex items-center justify-center gap-2 text-[10px] px-[18px] py-[10px] bg-(--bg) text-(--accent) border-none rounded-[30px] cursor-pointer shadow-[0_4px_12px_rgba(0,0,0,0.3)] transition-all duration-200 hover:scale-105 hover:shadow-[0_6px_16px_rgba(0,0,0,0.4)] active:scale-95"
            aria-label="Cambiar modo"
          >
            🌙 | ☀️
          </button>
          <button
            class="threebars w-[26px] h-[18px] flex flex-col justify-between bg-transparent border-none cursor-pointer p-0"
            id="threebars"
            aria-label="Seccion de despliegue de categorias"
          >
            <span></span> <span></span> <span></span>
          </button>
        </div>

        <!-- CENTRO -->
        <div class="justify-self-center">
          <img
            src="assets/imgs/Maison_PNG.png"
            alt="Logo Perfumeria"
            class="h-[200px] block"
          />
        </div>

        <!-- DERECHA -->
        <div
          class="justify-self-end flex items-center gap-[26px] font-sans text-sm tracking-wide"
        >
          <div
            class="search-container flex items-center gap-3 pb-1 cursor-text hover:border-b hover:border-(--accent)"
          >
            <svg
              class="stroke-(--bg) cursor-pointer opacity-85 hover:opacity-100 hover:-translate-y-px transition-all duration-200"
              width="30"
              height="30"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
              />
            </svg>
            <input
              type="text"
              id="search"
              placeholder="Buscar perfume"
              class="text-white bg-transparent opacity-90 text-[15px] tracking-wide border-none outline-none focus:opacity-100 transition-opacity duration-200"
            />
          </div>

          <div>
            <svg
              class="stroke-(--bg) cursor-pointer opacity-85 hover:opacity-100 hover:-translate-y-px transition-all duration-200"
              width="30"
              height="30"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z"
              />
            </svg>
          </div>

          <div class="relative">
            <div class="cart-icon cursor-pointer relative">
              <svg
                class="stroke-(--bg) cursor-pointer opacity-85 hover:opacity-100 hover:-translate-y-px transition-all duration-200"
                width="30"
                height="30"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
                />
              </svg>
              <span
                class="cart-count absolute -top-2 -right-2 bg-(--accent) text-black text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold"
                >0</span
              >
            </div>
            <div
              class="icon-cart-container hidden absolute top-[40px] right-0 bg-(--card-bg) border-2 border-(--accent) p-[10px] w-[200px] z-50"
            >
              <!-- Aquí se renderizan dinámicamente los productos del carrito -->
            </div>
          </div>

          <div class="relative">
            <div class="wishlist-icon cursor-pointer relative">
              <svg
                class="stroke-(--bg) cursor-pointer opacity-85 hover:opacity-100 hover:-translate-y-px transition-all duration-200"
                width="30"
                height="30"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z"
                />
              </svg>
              <span
                class="wishlist-count absolute -top-2 -right-2 bg-(--accent) text-black text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold"
                >0</span
              >
            </div>
            <div
              class="icon-wishlist-container hidden absolute top-[40px] right-0 bg-(--card-bg) border-2 border-(--accent) p-[10px] w-[200px] z-50"
            >
              <!-- Aquí se renderizan dinámicamente los productos de la wishlist -->
            </div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <!-- HERO -->
      <section class="relative w-full h-screen min-h-[550px] overflow-hidden">
        <div class="slider-track">
          <div class="slide w-full h-full shrink-0">
            <img
              src="assets/imgs/banner_logo.jpg"
              alt="Banner con Logo Perfumeria"
              class="w-full h-full object-cover object-top"
            />
          </div>
          <div class="slide w-full h-full shrink-0">
            <img
              src="assets/imgs/sale.jpg"
              alt="Banner de promocion"
              class="w-full h-full object-cover object-top"
            />
          </div>
          <div class="slide w-full h-full shrink-0">
            <img
              src="assets/imgs/perfume_1.jpg"
              alt="Banner de Fragancia 1"
              class="w-full h-full object-cover object-top"
            />
          </div>
          <div class="slide w-full h-full shrink-0">
            <img
              src="assets/imgs/pack.jpg"
              alt="Banner de pack fragancias"
              class="w-full h-full object-cover object-top"
            />
          </div>
        </div>
      </section>

      <!-- DESTACADOS -->
      <section class="bg-(--bg) py-[100px] px-20 text-center">
        <h2 class="font-serif tracking-[4px] text-[35px] mb-8 text-(--text)">
          DESTACADOS O MAS VENDIDOS
        </h2>
        <div class="flex justify-center gap-4 mb-16 text-sm">
          <button
            class="active text-(--text) bg-transparent border-none cursor-pointer font-serif font-bold"
          >
            Perfumes en tendencia
          </button>
          <span>/</span>
          <button
            class="text-(--text) bg-transparent border-none cursor-pointer font-serif"
          >
            Nuevos
          </button>
          <span>/</span>
          <button
            class="text-(--text) bg-transparent border-none cursor-pointer font-serif"
          >
            Top ventas mujer
          </button>
          <span>/</span>
          <button
            class="text-(--text) bg-transparent border-none cursor-pointer font-serif"
          >
            Top ventas hombres
          </button>
        </div>

        <!-- GRID -->
        <div
          id="products-grid"
          class="grid grid-cols-4 gap-8 max-lg:grid-cols-2 max-sm:grid-cols-1"
        >
          <!-- Las tarjetas de productos se generarán dinámicamente aquí -->
        </div>
      </section>
    </main>

    <!-- SCRIPT -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
